<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Core Brand Gradient: Teal to Emerald matching VisionGrid theme -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Sparkle/Glow Gradient: Bright Teal to Mint -->
    <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <!-- Top-Left: Solid Rounded Square -->
  <rect x="2" y="2" width="12" height="12" rx="3.5" fill="url(#brand-grad)" />

  <!-- Bottom-Right: Solid Rounded Square -->
  <rect x="18" y="18" width="12" height="12" rx="3.5" fill="url(#brand-grad)" />

  <!-- Bottom-Left: Outlined Rounded Square for high-tech grid/aperture aesthetic -->
  <rect x="3.5" y="19.5" width="9" height="9" rx="2.5" stroke="url(#brand-grad)" stroke-width="2" opacity="0.85" />

  <!-- Top-Right: Vibrant 4-Pointed Sparkle (Vision & Creative Inspiration) -->
  <path d="M 24 1 Q 24 8 31 8 Q 24 8 24 15 Q 24 8 17 8 Q 24 8 24 1 Z" fill="url(#sparkle-grad)" />
</svg>